# Port notes (see README):
# - jobscout/docker-compose.yml uses host 8001 (backend) and 5432 (Postgres).
# - This stack uses 8002 (API) and 5433 (Postgres on host) so both can run together.
#
# Credentials: only ${...} references here — values live in project-root `.env`
# (gitignored). Compose loads that file for variable substitution. Never put
# tunnel tokens, API keys, or production DB passwords in this file.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in project-root .env — see .env.example}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in project-root .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in project-root .env}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: eventmanager_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
